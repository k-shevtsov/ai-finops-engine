[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: requires real Claude API and k3d cluster (deselect with -m "not integration")
    slow: slow tests (deselect with -m "not slow")

addopts =
    --tb=short
    --strict-markers
    -v

asyncio_mode = auto

filterwarnings =
    ignore::DeprecationWarning:pythonjsonlogger
